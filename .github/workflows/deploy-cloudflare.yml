name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: krishak_voice_app/package-lock.json

      - name: Install deps
        working-directory: krishak_voice_app
        run: npm ci --prefer-offline --no-audit

      - name: Build for Cloudflare Pages
        working-directory: krishak_voice_app
        run: npm run pages:build
        env:
          # next-on-pages reads next.config.ts; nothing app-secret needed at
          # build time. Runtime env (VOICE_AGENT_ID / VOICE_API_KEY) is set in
          # the Cloudflare Pages dashboard, not here.
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: krishak_voice_app
          command: pages deploy .vercel/output/static --project-name=krishak-voice-bot --branch=main --commit-dirty=true
